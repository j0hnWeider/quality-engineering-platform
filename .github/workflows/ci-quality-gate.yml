name: Quality Gate Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java (for Allure)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          
      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Install k6 (performance testing)
        run: |
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Run API Tests
        run: npm run test:api
        env:
          API_BASE_URL: https://serverest.dev

      - name: Run Contract Tests (Consumer)
        run: npm run test:contract:consumer
        env:
          API_BASE_URL: https://serverest.dev

      - name: Run UI Tests
        run: npm run test:ui
        env:
          UI_BASE_URL: https://www.saucedemo.com

      - name: Run Security Tests (Active)
        run: npm run test:security

      - name: Performance Smoke Test (k6)
        run: npm run test:perf

      - name: Security Baseline Scan (OWASP ZAP)
        run: |
          chmod +x src/security/zap-baseline-scan.sh
          mkdir -p reports
          sudo ./src/security/zap-baseline-scan.sh

      - name: Generate Allure Report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/

      - name: Upload Test Artifacts (Playwright Report)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/